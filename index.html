<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzay Savaşçısı - Modern Arcade Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 3px solid #00ff88;
            border-radius: 15px;
            background: radial-gradient(circle, #000428 0%, #004e92 100%);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            background: transparent;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 25px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .score-board h3 {
            color: #00ff88;
            font-size: 14px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-board .value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .menu-screen h1 {
            font-size: 48px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 136, 0.8); }
            to { text-shadow: 0 0 30px rgba(0, 255, 136, 1), 0 0 40px rgba(0, 255, 136, 0.6); }
        }

        .menu-screen p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 25px;
            border: 2px solid #00ff88;
            font-size: 14px;
            color: #ccc;
            text-align: center;
        }

        .game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .game-over h2 {
            font-size: 36px;
            color: #ff4757;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.8);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ff88;
            border-radius: 50%;
            animation: float 3s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10px) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 850px) {
            .game-container {
                width: 95vw;
                height: 70vh;
            }
            
            .menu-screen h1 {
                font-size: 32px;
            }
            
            .ui-overlay {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="ui-overlay">
            <div class="score-board">
                <h3>Skor</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-board">
                <h3>Yüksek Skor</h3>
                <div class="value" id="highScore">0</div>
            </div>
            <div class="score-board">
                <h3>Seviye</h3>
                <div class="value" id="level">1</div>
            </div>
        </div>

        <div class="menu-screen" id="menuScreen">
            <h1>🚀 Uzay Savaşçısı</h1>
            <p>Düşman gemilerini yok et ve galaksinin kahramanı ol!</p>
            <p>WASD veya Ok tuşları ile hareket et, Boşluk tuşu ile ateş et</p>
            <button class="btn" onclick="startGame()">Oyunu Başlat</button>
            <button class="btn" onclick="showInstructions()">Nasıl Oynanır</button>
        </div>

        <div class="game-over" id="gameOverScreen">
            <h2>Oyun Bitti!</h2>
            <p>Skorun: <span id="finalScore">0</span></p>
            <button class="btn" onclick="restartGame()">Tekrar Oyna</button>
            <button class="btn" onclick="showMenu()">Ana Menü</button>
        </div>

        <div class="controls">
            <p>WASD / Ok Tuşları: Hareket | Boşluk: Ateş | P: Duraklat</p>
        </div>
    </div>

    <div class="particles" id="particles"></div>

    <script>
        // Oyun değişkenleri
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let level = 1;
        let animationId;

        // Oyun nesneleri
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 60,
            width: 40,
            height: 40,
            speed: 5,
            health: 100
        };

        let bullets = [];
        let enemies = [];
        let explosions = [];
        let powerUps = [];
        let stars = [];

        // Ses efektleri (basit beep sesleri)
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // Yıldız parçacıkları oluştur
        function createStars() {
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 2 + 1,
                    size: Math.random() * 2
                });
            }
        }

        // Yıldızları çiz
        function drawStars() {
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // Oyuncuyu çiz
        function drawPlayer() {
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(player.x - player.width/2, player.y - player.height/2, player.width, player.height);
            
            // Oyuncu gövdesi
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - player.width/2 + 5, player.y - player.height/2 + 5, player.width - 10, player.height - 10);
            
            // Motor efekti
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(player.x - 5, player.y + player.height/2, 10, 15);
        }

        // Mermi oluştur
        function createBullet() {
            bullets.push({
                x: player.x,
                y: player.y - player.height/2,
                width: 4,
                height: 10,
                speed: 8
            });
            playSound(800, 0.1);
        }

        // Mermileri çiz ve güncelle
        function updateBullets() {
            bullets.forEach((bullet, index) => {
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
                
                bullet.y -= bullet.speed;
                
                if (bullet.y < 0) {
                    bullets.splice(index, 1);
                }
            });
        }

        // Düşman oluştur
        function createEnemy() {
            if (Math.random() < 0.02 + level * 0.005) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -30,
                    width: 30 + Math.random() * 20,
                    height: 30 + Math.random() * 20,
                    speed: 2 + Math.random() * 2 + level * 0.5,
                    health: 1 + Math.floor(level / 3),
                    color: `hsl(${Math.random() * 360}, 70%, 50%)`
                });
            }
        }

        // Düşmanları çiz ve güncelle
        function updateEnemies() {
            enemies.forEach((enemy, index) => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x - enemy.width/2, enemy.y - enemy.height/2, enemy.width, enemy.height);
                
                enemy.y += enemy.speed;
                
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                }
            });
        }

        // Çarpışma kontrolü
        function checkCollisions() {
            bullets.forEach((bullet, bulletIndex) => {
                enemies.forEach((enemy, enemyIndex) => {
                    if (bullet.x < enemy.x + enemy.width/2 &&
                        bullet.x + bullet.width > enemy.x - enemy.width/2 &&
                        bullet.y < enemy.y + enemy.height/2 &&
                        bullet.y + bullet.height > enemy.y - enemy.height/2) {
                        
                        bullets.splice(bulletIndex, 1);
                        enemy.health--;
                        
                        if (enemy.health <= 0) {
                            enemies.splice(enemyIndex, 1);
                            score += 10 * level;
                            playSound(400, 0.2, 'square');
                            createExplosion(enemy.x, enemy.y);
                        }
                    }
                });
            });
            
            // Oyuncu-düşman çarpışması
            enemies.forEach((enemy, index) => {
                if (player.x < enemy.x + enemy.width/2 &&
                    player.x + player.width/2 > enemy.x - enemy.width/2 &&
                    player.y < enemy.y + enemy.height/2 &&
                    player.y + player.height/2 > enemy.y - enemy.height/2) {
                    
                    enemies.splice(index, 1);
                    player.health -= 20;
                    playSound(200, 0.3, 'sawtooth');
                    createExplosion(enemy.x, enemy.y);
                    
                    if (player.health <= 0) {
                        gameOver();
                    }
                }
            });
        }

        // Patlama efekti
        function createExplosion(x, y) {
            for (let i = 0; i < 8; i++) {
                explosions.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    maxLife: 30
                });
            }
        }

        // Patlamaları çiz
        function updateExplosions() {
            explosions.forEach((explosion, index) => {
                const alpha = explosion.life / explosion.maxLife;
                ctx.fillStyle = `rgba(255, 107, 107, ${alpha})`;
                ctx.beginPath();
                ctx.arc(explosion.x, explosion.y, 3, 0, Math.PI * 2);
                ctx.fill();
                
                explosion.x += explosion.vx;
                explosion.y += explosion.vy;
                explosion.life--;
                
                if (explosion.life <= 0) {
                    explosions.splice(index, 1);
                }
            });
        }

        // Seviye kontrolü
        function checkLevelUp() {
            const newLevel = Math.floor(score / 1000) + 1;
            if (newLevel > level) {
                level = newLevel;
                playSound(600, 0.5);
                document.getElementById('level').textContent = level;
            }
        }

        // Oyun döngüsü
        function gameLoop() {
            if (!gameRunning || gamePaused) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawStars();
            drawPlayer();
            updateBullets();
            createEnemy();
            updateEnemies();
            updateExplosions();
            checkCollisions();
            checkLevelUp();
            
            document.getElementById('score').textContent = score;
            
            animationId = requestAnimationFrame(gameLoop);
        }

        // Oyunu başlat
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            score = 0;
            level = 1;
            player.health = 100;
            bullets = [];
            enemies = [];
            explosions = [];
            
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('score').textContent = '0';
            document.getElementById('level').textContent = '1';
            
            gameLoop();
        }

        // Oyunu bitir
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
            playSound(150, 1, 'sawtooth');
        }

        // Oyunu yeniden başlat
        function restartGame() {
            startGame();
        }

        // Ana menüye dön
        function showMenu() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('menuScreen').style.display = 'flex';
        }

        // Talimatları göster
        function showInstructions() {
            alert('Oyun Kontrolleri:\n\nWASD veya Ok Tuşları: Gemiyi hareket ettir\nBoşluk Tuşu: Ateş et\nP Tuşu: Oyunu duraklat\n\nAmaç: Düşman gemilerini yok et ve yüksek skor elde et!\n\nHer 1000 puan seviye atlarsın ve düşmanlar daha hızlı olur.');
        }

        // Klavye kontrolleri
        const keys = {};
        
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (e.key === ' ' && gameRunning && !gamePaused) {
                e.preventDefault();
                createBullet();
            }
            
            if (e.key.toLowerCase() === 'p' && gameRunning) {
                gamePaused = !gamePaused;
                if (!gamePaused) gameLoop();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Oyuncu hareketi
        function updatePlayer() {
            if (keys['w'] || keys['arrowup']) {
                player.y = Math.max(player.height/2, player.y - player.speed);
            }
            if (keys['s'] || keys['arrowdown']) {
                player.y = Math.min(canvas.height - player.height/2, player.y + player.speed);
            }
            if (keys['a'] || keys['arrowleft']) {
                player.x = Math.max(player.width/2, player.x - player.speed);
            }
            if (keys['d'] || keys['arrowright']) {
                player.x = Math.min(canvas.width - player.width/2, player.x + player.speed);
            }
        }

        // Oyuncu hareketini sürekli kontrol et
        setInterval(() => {
            if (gameRunning && !gamePaused) {
                updatePlayer();
            }
        }, 16);

        // Yüksek skoru yükle
        document.getElementById('highScore').textContent = highScore;

        // Yıldızları oluştur
        createStars();

        // Canvas boyutunu ayarla
        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width - 6;
            canvas.height = rect.height - 6;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
