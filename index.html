<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzay Savaşçısı - Modern Oyun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 3px solid #00ff88;
            border-radius: 15px;
            background: linear-gradient(180deg, #000428 0%, #004e92 100%);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        #score {
            margin-bottom: 10px;
        }

        #lives {
            margin-bottom: 10px;
        }

        #level {
            margin-bottom: 10px;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ff88;
            z-index: 20;
        }

        #startScreen h1 {
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00ff88;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ff88; }
            to { text-shadow: 0 0 30px #00ff88, 0 0 40px #00ff88; }
        }

        #startButton {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 25px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        #startButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.5);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff4444;
            z-index: 20;
        }

        #gameOverScreen h2 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff4444;
        }

        #restartButton {
            padding: 12px 25px;
            font-size: 18px;
            background: linear-gradient(45deg, #ff4444, #cc3333);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #restartButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.5);
        }

        .instructions {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }

        @media (max-width: 850px) {
            #gameContainer {
                width: 95vw;
                height: 70vh;
            }
            
            #startScreen h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="score">Skor: 0</div>
            <div id="lives">Can: 3</div>
            <div id="level">Seviye: 1</div>
        </div>

        <div id="startScreen">
            <h1>🚀 UZAY SAVAŞÇISI 🚀</h1>
            <button id="startButton">OYUNA BAŞLA</button>
            <div class="instructions">
                <p>Fare ile nişan al ve tıkla!</p>
                <p>Düşmanları vur, puan kazan!</p>
            </div>
        </div>

        <div id="gameOverScreen">
            <h2>OYUN BİTTİ!</h2>
            <div id="finalScore">Final Skor: 0</div>
            <button id="restartButton">TEKRAR OYNA</button>
        </div>
    </div>

    <script>
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.gameRunning = false;
                this.enemies = [];
                this.bullets = [];
                this.particles = [];
                this.lastEnemySpawn = 0;
                this.enemySpawnRate = 2000;
                
                this.player = {
                    x: 400,
                    y: 550,
                    width: 40,
                    height: 40,
                    speed: 5
                };

                this.setupCanvas();
                this.setupEventListeners();
                this.gameLoop();
            }

            setupCanvas() {
                this.canvas.width = 800;
                this.canvas.height = 600;
            }

            setupEventListeners() {
                document.getElementById('startButton').addEventListener('click', () => {
                    this.startGame();
                });

                document.getElementById('restartButton').addEventListener('click', () => {
                    this.restartGame();
                });

                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.gameRunning) {
                        const rect = this.canvas.getBoundingClientRect();
                        this.player.x = e.clientX - rect.left - this.player.width / 2;
                        this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, this.player.x));
                    }
                });

                this.canvas.addEventListener('click', (e) => {
                    if (this.gameRunning) {
                        this.shoot();
                    }
                });
            }

            startGame() {
                document.getElementById('startScreen').style.display = 'none';
                this.gameRunning = true;
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.enemies = [];
                this.bullets = [];
                this.particles = [];
                this.updateUI();
            }

            restartGame() {
                document.getElementById('gameOverScreen').style.display = 'none';
                this.startGame();
            }

            gameOver() {
                this.gameRunning = false;
                document.getElementById('finalScore').textContent = `Final Skor: ${this.score}`;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }

            shoot() {
                this.bullets.push({
                    x: this.player.x + this.player.width / 2 - 2,
                    y: this.player.y,
                    width: 4,
                    height: 10,
                    speed: 8
                });
            }

            spawnEnemy() {
                const now = Date.now();
                if (now - this.lastEnemySpawn > this.enemySpawnRate) {
                    this.enemies.push({
                        x: Math.random() * (this.canvas.width - 30),
                        y: -30,
                        width: 30,
                        height: 30,
                        speed: 2 + Math.random() * 2,
                        health: 1
                    });
                    this.lastEnemySpawn = now;
                    this.enemySpawnRate = Math.max(500, this.enemySpawnRate - 50);
                }
            }

            update() {
                if (!this.gameRunning) return;

                this.spawnEnemy();

                // Update bullets
                this.bullets = this.bullets.filter(bullet => {
                    bullet.y -= bullet.speed;
                    return bullet.y > 0;
                });

                // Update enemies
                this.enemies = this.enemies.filter(enemy => {
                    enemy.y += enemy.speed;
                    
                    // Check collision with player
                    if (this.checkCollision(enemy, this.player)) {
                        this.lives--;
                        this.createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                        this.updateUI();
                        if (this.lives <= 0) {
                            this.gameOver();
                        }
                        return false;
                    }

                    // Check collision with bullets
                    for (let i = this.bullets.length - 1; i >= 0; i--) {
                        if (this.checkCollision(this.bullets[i], enemy)) {
                            enemy.health--;
                            this.bullets.splice(i, 1);
                            this.createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                            
                            if (enemy.health <= 0) {
                                this.score += 10;
                                this.updateUI();
                                return false;
                            }
                        }
                    }

                    return enemy.y < this.canvas.height;
                });

                // Update particles
                this.particles = this.particles.filter(particle => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.life--;
                    return particle.life > 0;
                });

                // Level up
                if (this.score > 0 && this.score % 100 === 0) {
                    this.level++;
                    this.updateUI();
                }
            }

            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            }

            createExplosion(x, y) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: 30,
                        color: `hsl(${Math.random() * 60 + 15}, 100%, 50%)`
                    });
                }
            }

            draw() {
                // Clear canvas
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw stars background
                this.drawStars();

                // Draw player
                this.ctx.fillStyle = '#00ff88';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                
                // Draw player glow
                this.ctx.shadowColor = '#00ff88';
                this.ctx.shadowBlur = 10;
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                this.ctx.shadowBlur = 0;

                // Draw bullets
                this.ctx.fillStyle = '#ffff00';
                this.bullets.forEach(bullet => {
                    this.ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                });

                // Draw enemies
                this.ctx.fillStyle = '#ff4444';
                this.enemies.forEach(enemy => {
                    this.ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                });

                // Draw particles
                this.particles.forEach(particle => {
                    this.ctx.fillStyle = particle.color;
                    this.ctx.globalAlpha = particle.life / 30;
                    this.ctx.fillRect(particle.x, particle.y, 3, 3);
                });
                this.ctx.globalAlpha = 1;
            }

            drawStars() {
                this.ctx.fillStyle = '#ffffff';
                for (let i = 0; i < 50; i++) {
                    const x = (i * 37) % this.canvas.width;
                    const y = (i * 73) % this.canvas.height;
                    const size = Math.sin(Date.now() * 0.001 + i) * 0.5 + 0.5;
                    this.ctx.fillRect(x, y, size, size);
                }
            }

            updateUI() {
                document.getElementById('score').textContent = `Skor: ${this.score}`;
                document.getElementById('lives').textContent = `Can: ${this.lives}`;
                document.getElementById('level').textContent = `Seviye: ${this.level}`;
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // Start the game when page loads
        window.addEventListener('load', () => {
            new Game();
        });
    </script>
</body>
</html>
