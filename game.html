<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Defender - Modern HTML Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #000066 100%);
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #00ffff;
            border-radius: 10px;
            overflow: hidden;
            background: radial-gradient(circle at center, #001122 0%, #000000 100%);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }

        canvas {
            display: block;
            background: transparent;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .health {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            color: #ff0080;
            text-shadow: 0 0 10px rgba(255, 0, 128, 0.8);
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0080, #ff4080);
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 128, 0.6);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ffff;
            display: none;
            z-index: 20;
        }

        .game-over h2 {
            font-size: 36px;
            color: #ff0080;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 0, 128, 0.8);
        }

        .restart-btn {
            background: linear-gradient(45deg, #00ffff, #0080ff);
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            pointer-events: all;
        }

        .restart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .power-up-indicator {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 16px;
            color: #ffff00;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
        }

        @media (max-width: 850px) {
            .game-container {
                width: 90vw;
                height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="ui-overlay">
            <div class="score">Skor: <span id="scoreValue">0</span></div>
            <div class="health">
                Sağlık: <span id="healthValue">100</span>
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="power-up-indicator" id="powerUpIndicator"></div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>Oyun Bitti!</h2>
            <p>Final Skorunuz: <span id="finalScore">0</span></p>
            <p>En Yüksek Skor: <span id="highScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">Tekrar Oyna</button>
        </div>

        <div class="instructions">
            WASD / Ok Tuşları: Hareket | Boşluk: Ateş | P: Duraklat
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Oyun durumu
        let gameState = {
            running: true,
            paused: false,
            score: 0,
            health: 100,
            wave: 1,
            powerUpActive: false,
            powerUpTime: 0
        };

        // Oyuncu
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 80,
            width: 50,
            height: 50,
            speed: 5,
            color: '#00ffff'
        };

        // Diziler
        let bullets = [];
        let enemies = [];
        let particles = [];
        let powerUps = [];
        let stars = [];

        // Tuş durumları
        const keys = {};

        // Yıldızları oluştur
        function createStars() {
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }

        // Düşman oluştur
        function createEnemy() {
            const types = [
                { width: 40, height: 40, speed: 2, health: 1, color: '#ff4444', points: 10 },
                { width: 60, height: 60, speed: 1, health: 3, color: '#ff8844', points: 25 },
                { width: 80, height: 80, speed: 0.5, health: 5, color: '#ff44ff', points: 50 }
            ];
            
            const type = types[Math.floor(Math.random() * types.length)];
            
            enemies.push({
                x: Math.random() * (canvas.width - type.width),
                y: -type.height,
                width: type.width,
                height: type.height,
                speed: type.speed + (gameState.wave * 0.2),
                health: type.health,
                maxHealth: type.health,
                color: type.color,
                points: type.points,
                shootTimer: 0
            });
        }

        // Mermi oluştur
        function createBullet(x, y, isPlayer = true) {
            bullets.push({
                x: x,
                y: y,
                width: 4,
                height: 10,
                speed: isPlayer ? -8 : 4,
                isPlayer: isPlayer,
                color: isPlayer ? '#00ff00' : '#ff0000'
            });
        }

        // Güçlendirici oluştur
        function createPowerUp(x, y) {
            if (Math.random() < 0.3) {
                powerUps.push({
                    x: x,
                    y: y,
                    width: 30,
                    height: 30,
                    speed: 2,
                    type: Math.random() < 0.5 ? 'rapidFire' : 'health',
                    color: Math.random() < 0.5 ? '#ffff00' : '#00ff00'
                });
            }
        }

        // Parçacık efekti
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        // Çarpışma kontrolü
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Oyuncu çizimi
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            
            // Gemi gövdesi
            ctx.fillStyle = player.color;
            ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height/2);
            
            // Gemi burnu
            ctx.beginPath();
            ctx.moveTo(0, -player.height/2);
            ctx.lineTo(-player.width/4, -player.height/4);
            ctx.lineTo(player.width/4, -player.height/4);
            ctx.closePath();
            ctx.fill();
            
            // Motor ateşi
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                ctx.fillStyle = '#ff4400';
                ctx.fillRect(-8, player.height/2, 16, 20);
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(-4, player.height/2, 8, 15);
            }
            
            ctx.restore();
        }

        // Düşman çizimi
        function drawEnemy(enemy) {
            ctx.save();
            ctx.translate(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
            
            // Düşman gövdesi
            ctx.fillStyle = enemy.color;
            ctx.fillRect(-enemy.width/2, -enemy.height/2, enemy.width, enemy.height);
            
            // Sağlık çubuğu
            const healthPercent = enemy.health / enemy.maxHealth;
            ctx.fillStyle = 'rgba(255, 0, 0, 0.7)';
            ctx.fillRect(-enemy.width/2, -enemy.height/2 - 8, enemy.width, 4);
            ctx.fillStyle = 'rgba(0, 255, 0, 0.7)';
            ctx.fillRect(-enemy.width/2, -enemy.height/2 - 8, enemy.width * healthPercent, 4);
            
            ctx.restore();
        }

        // Yıldızları çiz
        function drawStars() {
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.8 + 0.2;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            ctx.globalAlpha = 1;
        }

        // Güncelleme fonksiyonu
        function update() {
            if (!gameState.running || gameState.paused) return;

            // Yıldızları hareket ettir
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = -5;
                    star.x = Math.random() * canvas.width;
                }
            });

            // Oyuncu hareketi
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.x = Math.max(0, player.x - player.speed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.x = Math.min(canvas.width - player.width, player.x + player.speed);
            }
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                player.y = Math.max(0, player.y - player.speed);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                player.y = Math.min(canvas.height - player.height, player.y + player.speed);
            }

            // Güçlendirici süre kontrolü
            if (gameState.powerUpActive) {
                gameState.powerUpTime--;
                if (gameState.powerUpTime <= 0) {
                    gameState.powerUpActive = false;
                    document.getElementById('powerUpIndicator').textContent = '';
                }
            }

            // Mermileri güncelle
            bullets.forEach((bullet, index) => {
                bullet.y += bullet.speed;
                
                if (bullet.y < -bullet.height || bullet.y > canvas.height) {
                    bullets.splice(index, 1);
                }
            });

            // Düşmanları güncelle
            enemies.forEach((enemy, enemyIndex) => {
                enemy.y += enemy.speed;
                
                // Düşman ateş etme
                enemy.shootTimer++;
                if (enemy.shootTimer > 60 && Math.random() < 0.02) {
                    createBullet(enemy.x + enemy.width/2, enemy.y + enemy.height, false);
                    enemy.shootTimer = 0;
                }
                
                // Ekrandan çıkan düşmanları sil
                if (enemy.y > canvas.height) {
                    enemies.splice(enemyIndex, 1);
                }
            });

            // Güçlendiricileri güncelle
            powerUps.forEach((powerUp, index) => {
                powerUp.y += powerUp.speed;
                if (powerUp.y > canvas.height) {
                    powerUps.splice(index, 1);
                }
            });

            // Parçacıkları güncelle
            particles.forEach((particle, index) => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                particle.vx *= 0.98;
                particle.vy *= 0.98;
                
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            // Çarpışma kontrolları
            checkCollisions();

            // Yeni düşman oluştur
            if (Math.random() < 0.02 + (gameState.wave * 0.005)) {
                createEnemy();
            }

            // Dalga kontrolü
            if (gameState.score > gameState.wave * 500) {
                gameState.wave++;
            }
        }

        // Çarpışma kontrolları
        function checkCollisions() {
            // Oyuncu mermileri vs düşmanlar
            bullets.forEach((bullet, bulletIndex) => {
                if (!bullet.isPlayer) return;
                
                enemies.forEach((enemy, enemyIndex) => {
                    if (checkCollision(bullet, enemy)) {
                        enemy.health--;
                        createParticles(bullet.x, bullet.y, '#ffff00', 5);
                        bullets.splice(bulletIndex, 1);
                        
                        if (enemy.health <= 0) {
                            gameState.score += enemy.points;
                            createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color, 15);
                            createPowerUp(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                            enemies.splice(enemyIndex, 1);
                        }
                    }
                });
            });

            // Düşman mermileri vs oyuncu
            bullets.forEach((bullet, bulletIndex) => {
                if (bullet.isPlayer) return;
                
                if (checkCollision(bullet, player)) {
                    gameState.health -= 10;
                    createParticles(bullet.x, bullet.y, '#ff0000', 8);
                    bullets.splice(bulletIndex, 1);
                    
                    if (gameState.health <= 0) {
                        gameOver();
                    }
                }
            });

            // Düşmanlar vs oyuncu
            enemies.forEach((enemy, enemyIndex) => {
                if (checkCollision(enemy, player)) {
                    gameState.health -= 20;
                    createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#ff0000', 20);
                    enemies.splice(enemyIndex, 1);
                    
                    if (gameState.health <= 0) {
                        gameOver();
                    }
                }
            });

            // Güçlendiriciler vs oyuncu
            powerUps.forEach((powerUp, index) => {
                if (checkCollision(powerUp, player)) {
                    if (powerUp.type === 'rapidFire') {
                        gameState.powerUpActive = true;
                        gameState.powerUpTime = 300;
                        document.getElementById('powerUpIndicator').textContent = 'Hızlı Ateş Aktif!';
                    } else if (powerUp.type === 'health') {
                        gameState.health = Math.min(100, gameState.health + 30);
                    }
                    
                    createParticles(powerUp.x, powerUp.y, powerUp.color, 10);
                    powerUps.splice(index, 1);
                }
            });
        }

        // Çizim fonksiyonu
        function draw() {
            // Ekranı temizle
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Yıldızları çiz
            drawStars();
            
            // Oyuncuyu çiz
            drawPlayer();
            
            // Düşmanları çiz
            enemies.forEach(drawEnemy);
            
            // Mermileri çiz
            ctx.fillStyle = '#00ff00';
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                
                // Mermi parıltısı
                ctx.shadowBlur = 10;
                ctx.shadowColor = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });
            
            // Güçlendiricileri çiz
            powerUps.forEach(powerUp => {
                ctx.save();
                ctx.translate(powerUp.x + powerUp.width/2, powerUp.y + powerUp.height/2);
                ctx.rotate(Date.now() * 0.005);
                ctx.fillStyle = powerUp.color;
                ctx.fillRect(-powerUp.width/2, -powerUp.height/2, powerUp.width, powerUp.height);
                ctx.restore();
            });
            
            // Parçacıkları çiz
            particles.forEach(particle => {
                ctx.globalAlpha = particle.life / 30;
                ctx.fillStyle = particle.color;
                ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
            });
            ctx.globalAlpha = 1;
            
            // UI güncelle
            updateUI();
        }

        // UI güncelleme
        function updateUI() {
            document.getElementById('scoreValue').textContent = gameState.score;
            document.getElementById('healthValue').textContent = gameState.health;
            document.getElementById('healthFill').style.width = gameState.health + '%';
        }

        // Oyun döngüsü
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Oyun bitişi
        function gameOver() {
            gameState.running = false;
            
            // En yüksek skoru kaydet
            const highScore = localStorage.getItem('spaceDefenderHighScore') || 0;
            if (gameState.score > highScore) {
                localStorage.setItem('spaceDefenderHighScore', gameState.score);
            }
            
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('highScore').textContent = Math.max(gameState.score, highScore);
            document.getElementById('gameOver').style.display = 'block';
        }

        // Oyunu yeniden başlat
        function restartGame() {
            gameState = {
                running: true,
                paused: false,
                score: 0,
                health: 100,
                wave: 1,
                powerUpActive: false,
                powerUpTime: 0
            };
            
            player.x = canvas.width / 2 - 25;
            player.y = canvas.height - 80;
            
            bullets = [];
            enemies = [];
            particles = [];
            powerUps = [];
            
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('powerUpIndicator').textContent = '';
        }

        // Olay dinleyicileri
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (gameState.running && !gameState.paused) {
                    const fireRate = gameState.powerUpActive ? 5 : 10;
                    if (Date.now() % fireRate < 2) {
                        createBullet(player.x + player.width/2 - 2, player.y);
                    }
                }
            }
            
            if (e.key === 'p' || e.key === 'P') {
                gameState.paused = !gameState.paused;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Oyunu başlat
        createStars();
        
        // En yüksek skoru göster
        const savedHighScore = localStorage.getItem('spaceDefenderHighScore') || 0;
        document.getElementById('highScore').textContent = savedHighScore;
        
        gameLoop();
    </script>
</body>
</html>
